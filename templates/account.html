<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POUR AI — 계정 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F4FF;color:#1E293B;min-height:100vh;}
:root{--blue:#2563EB;--blue-light:#EFF6FF;--border:#E2E8F0;--card:#fff;--text:#1E293B;--sub:#64748B;--red:#EF4444;--green:#16A34A;}

/* Header */
.hdr{background:var(--blue);color:white;padding:16px 24px;display:flex;align-items:center;gap:12px;}
.hdr-logo{font-size:18px;font-weight:800;letter-spacing:-.5px;}
.hdr-title{font-size:14px;opacity:.8;}
.hdr-nav{margin-left:auto;display:flex;gap:12px;}
.hdr-nav a{color:rgba(255,255,255,.75);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:8px;transition:.2s;}
.hdr-nav a:hover{background:rgba(255,255,255,.15);color:white;}

/* Layout */
.wrap{max-width:480px;margin:0 auto;padding:40px 20px;}

.sec-card{background:var(--card);border-radius:16px;padding:28px 24px;border:1px solid var(--border);margin-bottom:16px;}
.sec-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:20px;}

.field{margin-bottom:16px;}
.field-label{font-size:12px;font-weight:600;color:var(--sub);margin-bottom:6px;display:block;}
.field-input{width:100%;height:42px;padding:0 14px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;font-family:inherit;color:var(--text);outline:none;transition:.2s;}
.field-input:focus{border-color:var(--blue);}

.save-btn{height:42px;padding:0 24px;background:var(--blue);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:.2s;}
.save-btn:hover{background:#1D4ED8;}
.save-btn:disabled{opacity:.5;cursor:default;}

.msg{margin-top:14px;padding:10px 14px;border-radius:10px;font-size:13px;display:none;text-align:center;}
.msg.error{background:#FEF2F2;color:var(--red);}
.msg.success{background:#F0FDF4;color:var(--green);}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">POUR AI</div>
  <div class="hdr-title">계정 관리</div>
  <nav class="hdr-nav">
    <a href="/admin">관리자 대시보드</a>
    <a href="/consult">상담원 조회</a>
    <a href="/methods">공법 관리</a>
    <a href="/account">계정 관리</a>
    <a href="/logout" style="opacity:.6">로그아웃</a>
  </nav>
</div>

<div class="wrap">
  <div class="sec-card">
    <div class="sec-title">비밀번호 변경</div>

    <div class="field">
      <label class="field-label">현재 비밀번호</label>
      <input class="field-input" id="current-pw" type="password" placeholder="현재 비밀번호 입력">
    </div>

    <div class="field">
      <label class="field-label">새 비밀번호</label>
      <input class="field-input" id="new-pw" type="password" placeholder="새 비밀번호 (4자 이상)">
    </div>

    <div class="field">
      <label class="field-label">새 비밀번호 확인</label>
      <input class="field-input" id="confirm-pw" type="password" placeholder="새 비밀번호 다시 입력"
        onkeydown="if(event.key==='Enter') changePassword()">
    </div>

    <button class="save-btn" id="save-btn" onclick="changePassword()">비밀번호 변경</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
function changePassword() {
  const currentPw = document.getElementById('current-pw').value;
  const newPw = document.getElementById('new-pw').value;
  const confirmPw = document.getElementById('confirm-pw').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('save-btn');

  msg.style.display = 'none';

  if (!currentPw || !newPw) {
    showMsg('모든 필드를 입력해주세요.', 'error');
    return;
  }
  if (newPw.length < 4) {
    showMsg('새 비밀번호는 4자 이상이어야 합니다.', 'error');
    return;
  }
  if (newPw !== confirmPw) {
    showMsg('새 비밀번호가 일치하지 않습니다.', 'error');
    return;
  }

  btn.disabled = true;

  fetch('/api/auth/password', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ current_password: currentPw, new_password: newPw }),
  })
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        showMsg('비밀번호가 변경되었습니다.', 'success');
        document.getElementById('current-pw').value = '';
        document.getElementById('new-pw').value = '';
        document.getElementById('confirm-pw').value = '';
      } else {
        showMsg(data.error || '변경 실패', 'error');
      }
      btn.disabled = false;
    })
    .catch(() => {
      showMsg('서버 오류가 발생했습니다.', 'error');
      btn.disabled = false;
    });
}

function showMsg(text, type) {
  const msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = 'msg ' + type;
  msg.style.display = 'block';
}
</script>
</body>
</html>
